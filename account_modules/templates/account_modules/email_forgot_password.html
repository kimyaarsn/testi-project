{% extends 'base.html' %}
{% block page_title %}
    فراموشی رمزعبور
{% endblock %}

{% block page_content %}

     <div id="contact" class="contact_area section-padding">
        <div class="container">
            <div class="row">
                <div class="col-lg-7 col-sm-12 col-xs-12 wow fadeInUp" data-wow-duration="1s" data-wow-delay="0.2s"
                    data-wow-offset="0">
                    <div class="contact">
<form method="post" novalidate>
{% csrf_token %}
<div class="row">
    <div class="form-group col-md-6">
        <label>ایمیل شما</label>
        <input
            type="email"
            name="email"
            class="form-control"
            value="{{ forgot_password_form.email.value|default:'' }}"
            required
        >
        {% for error in forgot_password_form.email.errors %}
            <small class="text-danger">
                {{ error }}
            </small>
        {% endfor %}
    </div>
    <div class="login-btn text-center mt-3 mb-3">
        <p>
            <a href="{% url 'login' %}">
                بازگشت به ورود
            </a>
        </p>
    </div>
    <div class="col-md-12 text-center">
        <button
            type="submit"
            class="btn_one"
        >
            ارسال لینک بازیابی
        </button>
    </div>
</div>
</form>
                    </div>
                </div>

            </div>
        </div>
    </div>
{% endblock %}
