{% extends 'base.html' %}
{% block page_tile %}
بازیابی رمز عبور
{% endblock %}

{% block page_content %}

 <div id="contact" class="contact_area section-padding">
        <div class="container">
            <div class="row">
                <div class="col-lg-7 col-sm-12 col-xs-12 wow fadeInUp" data-wow-duration="1s" data-wow-delay="0.2s"
                    data-wow-offset="0">
                    <div class="contact">
<form method="post" novalidate>
{% csrf_token %}
<div class="row">
    <div class="form-group col-md-6">
        <label>رمز عبور جدید</label>
        <input
            type="password"
            name="password"
            class="form-control"
            required
        >
        {% for error in reset_form.password.errors %}
            <small class="text-danger">
                {{ error }}
            </small>
        {% endfor %}
    </div>
    <div class="col-md-12 text-center">
        <button
            type="submit"
            class="btn_one"
        >
            ثبت رمز جدید
        </button>
    </div>
</div>
</form>
                    </div>
                </div>

            </div>
        </div>
    </div>
{% endblock %}
