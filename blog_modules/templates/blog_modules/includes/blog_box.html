{% load static %}
{% load poll_extras %}

                <div class="col-lg-4 col-sm-4 col-xs-12 wow fadeInUp" data-wow-duration="1s" data-wow-delay="0.1s"
                    data-wow-offset="0">
                    <div class="single_blog">
                        <img src="{{ blog.image.url }}" class="img-fluid" alt="{{ blog.title }}" style="width:100%; height:220px; object-fit:cover;">
                        <div class="content_box">
                            <span> {{ blog.created_date|show_jalali_date }}<a href="{{ blog.get_absolute_url }}"> {{ blog.category.title }}</a></span>
                            <h2><a href="{{ blog.get_absolute_url }}"> {{ blog.title }}</a></h2>
                            <a class="btn_one" href="{{ blog.get_absolute_url }}">ادامه مطلب<i class="ti-arrow-top-left"></i></a>
                        </div>
                    </div>
                </div>
